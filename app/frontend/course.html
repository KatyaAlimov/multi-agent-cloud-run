<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Course - AI Course Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Inline anti-flash theme initializer -->
    <script>
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="course-page">
    <div class="course-container">
        <header class="course-header">
            <a href="/" class="back-link">← Create Another Course</a>
            <div class="logo">🎓 AI Course Creator</div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        </header>

        <div class="course-layout">
            <aside class="course-sidebar">
                <div class="toc-title">Contents</div>
                <nav>
                    <ul id="toc-list" class="toc-list">
                        <!-- TOC items will be injected here -->
                    </ul>
                </nav>
            </aside>

            <main class="course-main">
                <article id="course-content" class="course-content">
                    <div class="loading-course">Loading your course...</div>
                </article>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            // --- Theme Sync Script Segment ---
            const themeToggleBtn = document.getElementById('theme-toggle');
            const currentActiveTheme = document.documentElement.getAttribute('data-theme');
            
            themeToggleBtn.textContent = currentActiveTheme === 'dark' ? '☀️' : '🌙';

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', nextTheme);
                localStorage.setItem('theme', nextTheme);
                themeToggleBtn.textContent = nextTheme === 'dark' ? '☀️' : '🌙';
            });

            // --- Course Rendering Pipeline ---
            const courseData = localStorage.getItem('currentCourse');
            if (!courseData) {
                window.location.href = '/';
                return;
            }
            
            const contentContainer = document.getElementById('course-content');
            const tocList = document.getElementById('toc-list');

            // Render Markdown
            if (typeof marked === 'undefined') {
                contentContainer.textContent = courseData;
            } else {
                contentContainer.innerHTML = marked.parse(courseData);
            }

            function getSectionText(heading) {
                const chunks = [heading.textContent.trim()];
                let node = heading.nextElementSibling;

                while (node && node.tagName !== 'H2' && node.tagName !== 'H3') {
                    const text = node.innerText?.trim();
                    if (text) {
                        chunks.push(text);
                    }
                    node = node.nextElementSibling;
                }

                return chunks.join('\n\n');
            }

            function addVideoControls(heading) {
                const videoPanel = document.createElement('div');
                videoPanel.className = 'section-video-panel';

                const videoButton = document.createElement('button');
                videoButton.type = 'button';
                videoButton.className = 'section-video-button';
                videoButton.textContent = 'Create video lesson for this section';

                const videoStatus = document.createElement('div');
                videoStatus.className = 'section-video-status';

                const videoResult = document.createElement('div');
                videoResult.className = 'section-video-result';

                videoPanel.appendChild(videoButton);
                videoPanel.appendChild(videoStatus);
                videoPanel.appendChild(videoResult);

                heading.insertAdjacentElement('afterend', videoPanel);

                videoButton.addEventListener('click', async () => {
                    videoButton.disabled = true;
                    videoButton.textContent = 'Creating lesson video...';
                    videoStatus.textContent = 'Generating a 3-6 minute slide-based video lesson. This may take several minutes.';
                    videoResult.innerHTML = '';

                    try {
                        const response = await fetch('/api/generate_lesson_video', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                course_title: contentContainer.querySelector('h1')?.textContent || 'Generated Course',
                                section_title: heading.textContent.trim(),
                                section_text: getSectionText(heading)
                            })
                        });

                        const data = await response.json();

                        if (!response.ok) {
                            throw new Error(data.detail || 'Lesson video generation failed.');
                        }

                        const videoSource = data.video_url;

                        if (!videoSource) {
                            videoStatus.textContent = 'The lesson video was created, but no video URL was returned.';
                            return;
                        }

                        videoStatus.textContent = `Lesson video ready. Target length: ${data.target_duration_minutes || '3-6'} minutes.`;

                        const video = document.createElement('video');
                        video.controls = true;
                        video.className = 'section-video-player';
                        video.src = videoSource;

                        videoResult.innerHTML = '';
                        videoResult.appendChild(video);

                        if (data.script_markdown) {
                            const details = document.createElement('details');
                            details.className = 'lesson-script-details';

                            const summary = document.createElement('summary');
                            summary.textContent = 'View generated script and storyboard';

                            const scriptContainer = document.createElement('div');
                            scriptContainer.className = 'video-script-output';

                            if (typeof marked === 'undefined') {
                                scriptContainer.textContent = data.script_markdown;
                            } else {
                                scriptContainer.innerHTML = marked.parse(data.script_markdown);
                            }

                            details.appendChild(summary);
                            details.appendChild(scriptContainer);
                            videoResult.appendChild(details);
                        }

                        videoButton.textContent = 'Create another lesson video';
                    } catch (error) {
                        console.error('Lesson video generation failed:', error);
                        videoStatus.textContent = error.message;
                        videoButton.textContent = 'Try again';
                    } finally {
                        videoButton.disabled = false;
                    }
                });
            }
            
            // Generate TOC from h2/h3 elements
            const headings = contentContainer.querySelectorAll('h2, h3');

            if (headings.length === 0) {
                document.querySelector('.course-sidebar').style.display = 'none';
                document.querySelector('.course-layout').style.justifyContent = 'center';
            } else {
                headings.forEach((heading, index) => {
                    const id = 'section-' + index;
                    heading.id = id;
                    
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = '#' + id;
                    a.textContent = heading.textContent;
                    a.classList.add('toc-link');
                    
                    a.addEventListener('click', () => {
                        document.querySelectorAll('.toc-link').forEach(link => link.classList.remove('active'));
                        a.classList.add('active');
                    });

                    li.appendChild(a);
                    tocList.appendChild(li);

                    addVideoControls(heading);
                });
            }
        });
    </script>
</body>
</html>
