<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Course - AI Course Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Inline anti-flash theme initializer -->
    <script>
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="course-page">
    <div class="course-container">
        <header class="course-header">
            <a href="/" class="back-link">← Create Another Course</a>
            <div class="logo">🎓 AI Course Creator</div>
            <!-- Embedded theme toggle control action element -->
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        </header>
        <div class="course-layout">
            <aside class="course-sidebar">
                <div class="toc-title">Contents</div>
                <nav>
                    <ul id="toc-list" class="toc-list">
                        <!-- TOC items will be injected here -->
                    </ul>
                </nav>
            </aside>
            <main class="course-main">
                <article id="course-content" class="course-content">
                    <div class="loading-course">Loading your course...</div>
                </article>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Theme Sync Script Segment ---
            const themeToggleBtn = document.getElementById('theme-toggle');
            const currentActiveTheme = document.documentElement.getAttribute('data-theme');
            
            // Set initial state matching string literal icon indicator
            themeToggleBtn.textContent = currentActiveTheme === 'dark' ? '☀️' : '🌙';

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', nextTheme);
                localStorage.setItem('theme', nextTheme);
                themeToggleBtn.textContent = nextTheme === 'dark' ? '☀️' : '🌙';
            });

            // --- Course Rendering Pipeline ---
            const courseData = localStorage.getItem('currentCourse');
            if (!courseData) {
                window.location.href = '/';
                return;
            }
            
            const contentContainer = document.getElementById('course-content');
            const tocList = document.getElementById('toc-list');
            
            // Render Markdown
            contentContainer.innerHTML = marked.parse(courseData);
            const courseTitle = contentContainer.querySelector('h1')?.textContent || 'Generated Course';

            function getSectionText(heading) {
                const chunks = [heading.textContent.trim()];
                let node = heading.nextElementSibling;

                while (node && node.tagName !== 'H2') {
                    if (!node.classList.contains('section-video-panel')) {
                        const text = node.innerText?.trim();
                        if (text) {
                            chunks.push(text);
                        }
                    }
                    node = node.nextElementSibling;
                }

                return chunks.join('\n\n');
            }

            function showVideoResult(resultContainer, data) {
                resultContainer.innerHTML = '';

                const videoSource = data.video_data_url || data.video_uri;
                if (!videoSource) {
                    resultContainer.textContent = 'The video was created, but no playable video source was returned.';
                    return;
                }

                if (videoSource.startsWith('gs://')) {
                    const message = document.createElement('p');
                    message.className = 'video-generation-note';
                    message.textContent = `Video created at ${videoSource}. Open this Cloud Storage URI from your Google Cloud project.`;
                    resultContainer.appendChild(message);
                    return;
                }

                const video = document.createElement('video');
                video.className = 'section-video-player';
                video.controls = true;
                video.src = videoSource;
                resultContainer.appendChild(video);
            }

            async function createSectionVideo(heading, button, status, resultContainer) {
                button.disabled = true;
                button.textContent = 'Creating video...';
                status.textContent = 'Generating a section video. This can take a few minutes.';
                resultContainer.innerHTML = '';

                try {
                    const response = await fetch('/api/generate_video', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            course_title: courseTitle,
                            section_title: heading.textContent.trim(),
                            section_text: getSectionText(heading)
                        })
                    });

                    if (!response.ok) {
                        let detail = `HTTP error! status: ${response.status}`;
                        try {
                            const errorBody = await response.json();
                            detail = errorBody.detail || detail;
                        } catch (_) {
                            // Keep the HTTP status fallback if the body is not JSON.
                        }
                        throw new Error(detail);
                    }

                    const data = await response.json();
                    showVideoResult(resultContainer, data);
                    status.textContent = 'Video ready.';
                    button.textContent = 'Create another video';
                } catch (error) {
                    console.error('Video generation failed:', error);
                    status.textContent = `Video generation failed: ${error.message}`;
                    button.textContent = 'Try video again';
                } finally {
                    button.disabled = false;
                }
            }

            function addVideoControl(heading) {
                const panel = document.createElement('div');
                panel.className = 'section-video-panel';

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'section-video-button';
                button.textContent = 'Create video for this section';

                const status = document.createElement('div');
                status.className = 'section-video-status';

                const resultContainer = document.createElement('div');
                resultContainer.className = 'section-video-result';

                button.addEventListener('click', () => {
                    createSectionVideo(heading, button, status, resultContainer);
                });

                panel.appendChild(button);
                panel.appendChild(status);
                panel.appendChild(resultContainer);
                heading.insertAdjacentElement('afterend', panel);
            }
            
            // Generate TOC from h2 elements
            const headings = contentContainer.querySelectorAll('h2');
            if (headings.length === 0) {
                document.querySelector('.course-sidebar').style.display = 'none';
                document.querySelector('.course-layout').style.justifyContent = 'center';
            } else {
                headings.forEach((heading, index) => {
                    const id = 'section-' + index;
                    heading.id = id;
                    
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = '#' + id;
                    a.textContent = heading.textContent;
                    a.classList.add('toc-link');
                    
                    // Simple active state on click
                    a.addEventListener('click', () => {
                        document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
                        a.classList.add('active');
                    });

                    li.appendChild(a);
                    tocList.appendChild(li);
                    addVideoControl(heading);
                });
            }
        });
    </script>
</body>
</html>
